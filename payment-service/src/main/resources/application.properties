spring.application.name=payment-service

server.port=9050

# Bind only to the loopback interface so this service os NOT reachable from outside the host.
# Only the API Gateway is exposed externally; all traffic must come through it
server.address=127.0.0.1

spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

razorpay.key.id=${RAZORPAY_KEY}
razorpay.key.secret=${RAZORPAY_SECRET}
razorpay.webhook.key.secret=${RAZORPAY_WEBHOOK_SECRET}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

#eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
