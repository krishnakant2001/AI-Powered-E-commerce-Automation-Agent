spring.application.name=discovery-server

server.port=8761

# Bind only to the loopback interface so this service os NOT reachable from outside the host.
# Local clients (gateway + services) connect via http://localhost:8761 which resolve to 127.0.0.1
server.address=127.0.0.1

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false