server.port: 8080
jwt.secretKey: ${JWT_SECRET_KEY}

#api-gateway-config
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

#eureka-configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
