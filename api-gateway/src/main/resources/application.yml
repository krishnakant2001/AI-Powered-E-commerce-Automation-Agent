server.port: 8080
jwt.secretKey: ${JWT_SECRET_KEY}

#api-gateway-config
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**, /api/v1/admin/products/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter
#            - RewritePath=/api/v1/(?<segment>.*), /${segment}

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

#eureka-configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
