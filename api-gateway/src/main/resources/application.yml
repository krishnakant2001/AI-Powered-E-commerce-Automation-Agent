# The API Gateway is the ONLY externally exposed service.
# Bind to all interfaces (0.0.0.0) so external clients can reach it on port 8080.
# Every other service binds to 127.0.0.1 (loopback) and is only reachable through this gateway.
server:
  port: 8080
  address: 0.0.0.0

jwt.secretKey: ${JWT_SECRET_KEY}

#api-gateway-config
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: agent-service
          uri: lb://AGENT-SERVICE
          predicates:
          - Path=/api/v1/agent/**
          filters:
          - StripPrefix=2
          - AuthenticationFilter

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**, /api/v1/admin/products/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2
            - AuthenticationFilter

#eureka-configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
